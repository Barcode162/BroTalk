<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
    <title>BroTalk</title>
    <link rel="stylesheet" href="splash.css" />
  </head>
  <body>
    <div id="splash">
      <canvas id="stage" aria-hidden="true"></canvas>

      <div class="vignette" aria-hidden="true"></div>

      <header class="brand-row">
        <h1 class="wordmark">BroTalk</h1>
        <p class="tagline" id="tagline">Tuning the line…</p>
      </header>

      <div class="action-stack" id="action-stack">
        <button id="btn-update" class="cta cta-update hidden" type="button">
          <span class="cta-glow" aria-hidden="true"></span>
          <span class="cta-text">
            <span class="cta-eyebrow">New version ready</span>
            <span class="cta-title" id="update-title">Install update</span>
          </span>
          <span class="cta-arrow" aria-hidden="true">→</span>
        </button>
        <button id="btn-continue" class="cta cta-continue" type="button" disabled>
          <span class="cta-text">
            <span class="cta-title" id="continue-title">Loading…</span>
          </span>
        </button>
      </div>

      <button id="btn-fact" class="fact-btn" type="button" title="Fun fact">
        <span aria-hidden="true">!</span>
      </button>

      <div id="fact-modal" class="fact-modal hidden" role="dialog" aria-modal="true" aria-labelledby="fact-title">
        <div class="fact-card">
          <div class="fact-eyebrow">Did you know</div>
          <p class="fact-body" id="fact-body">—</p>
          <div class="fact-actions">
            <button id="btn-fact-next" class="fact-secondary" type="button">Another</button>
            <button id="btn-fact-close" class="fact-primary" type="button">Got it</button>
          </div>
        </div>
      </div>

      <footer class="footer">
        <span class="footer-name">BroTalk</span>
        <span class="footer-dot" aria-hidden="true">•</span>
        <span class="footer-version" id="footer-version">v—</span>
      </footer>
    </div>

    <script src="splash.js"></script>
  </body>
</html>
